<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nexus</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">✦</div>
        <h1>Nexus</h1>
        <p>Connect with people who matter</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
      </div>

      <div id="auth-error" class="auth-error"></div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" />
        </div>
        <button class="btn-auth" id="login-btn" onclick="handleLogin()">Sign In</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-fullname" class="form-control" placeholder="Your Name" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" class="form-control" placeholder="cooluser" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" />
        </div>
        <button class="btn-auth" id="reg-btn" onclick="handleRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      clearError();
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      document.getElementById('auth-error').style.display = 'none';
    }

    async function handleLogin() {
      clearError();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showError('Please fill in all fields');

      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        setAuth(data.token, data.user);
        window.location.href = '/frontend/index.html';
      } catch (err) {
        showError(err.message);
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }

    async function handleRegister() {
      clearError();
      const fullName = document.getElementById('reg-fullname').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      if (!username || !email || !password) return showError('Username, email and password are required');

      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ fullName, username, email, password })
        });
        setAuth(data.token, data.user);
        window.location.href = '/frontend/index.html';
      } catch (err) {
        showError(err.message);
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const loginVisible = document.getElementById('login-form').style.display !== 'none';
        if (loginVisible) handleLogin(); else handleRegister();
      }
    });
  </script>
</body>
</html>
